<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnshare</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --bg-surface: #161b22;
            --bg-elevated: #1c2129;
            --border: #30363d;
            --border-subtle: #21262d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-subtle: #6e7681;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-purple: #bc8cff;
            --accent-red: #f85149;
            --accent-cyan: #76d9e6;
            --user-bg: #161b22;
            --assistant-bg: #0d1117;
            --tool-bg: #111518;
            --radius: 8px;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, Monaco, 'Courier New', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
        }

        .loading, .error {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 15px;
        }
        .loading { color: var(--text-muted); }
        .error { color: var(--accent-red); }

        /* Header */
        .session-header {
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            margin-bottom: 0;
            background: var(--bg-surface);
        }
        .header-inner {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .agent-badge.claude-code { background: #553518; color: #f0a050; }
        .agent-badge.codex { background: #1a3a1a; color: var(--accent-green); }
        .agent-badge.opencode { background: #1a2a3a; color: var(--accent-cyan); }
        .header-project {
            font-size: 18px;
            font-weight: 600;
            font-family: var(--font-sans);
            color: var(--text);
        }
        .header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .header-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .meta-label { color: var(--text-subtle); }

        /* Turn container */
        .turns {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Turn */
        .turn {
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 0;
        }
        .turn:last-child { border-bottom: none; }

        .turn-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .role-indicator {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .role-user .role-indicator { background: #1a2a1a; color: var(--accent-green); }
        .role-assistant .role-indicator { background: #1a1a2e; color: var(--accent-purple); }
        .role-tool .role-indicator { background: #1a2020; color: var(--accent-cyan); }
        .turn-timestamp {
            color: var(--text-subtle);
            font-size: 11px;
        }

        .turn-content {
            padding-left: 0;
        }

        /* Text content */
        .content-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.65;
        }
        .content-text p { margin-bottom: 10px; }
        .content-text p:last-child { margin-bottom: 0; }
        .content-text strong { color: #fff; font-weight: 600; }
        .content-text em { font-style: italic; color: var(--text-muted); }
        .content-text a { color: var(--accent-blue); text-decoration: none; }
        .content-text a:hover { text-decoration: underline; }
        .content-text code {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 13px;
        }
        .content-text ul, .content-text ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        .content-text li { margin-bottom: 4px; }
        .content-text h1, .content-text h2, .content-text h3 {
            font-family: var(--font-sans);
            margin: 16px 0 8px;
            color: #fff;
        }
        .content-text h1 { font-size: 20px; }
        .content-text h2 { font-size: 17px; }
        .content-text h3 { font-size: 15px; }

        /* Code blocks */
        .code-block {
            position: relative;
            margin: 12px 0;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }
        .code-block pre {
            margin: 0;
            padding: 12px 16px;
            background: var(--bg-surface);
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }
        .code-block code {
            background: none;
            border: none;
            padding: 0;
            font-size: inherit;
        }

        /* Copy button */
        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 2px 8px;
            transition: color 0.15s, border-color 0.15s;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--text-muted); }
        .copy-btn.copied { color: var(--accent-green); border-color: var(--accent-green); }

        /* Syntax highlighting tokens */
        .sh-keyword { color: #ff7b72; }
        .sh-string { color: #a5d6ff; }
        .sh-comment { color: #6e7681; font-style: italic; }
        .sh-number { color: #79c0ff; }
        .sh-function { color: #d2a8ff; }
        .sh-operator { color: #ff7b72; }
        .sh-punctuation { color: #8b949e; }
        .sh-type { color: #ffa657; }
        .sh-property { color: #79c0ff; }
        .sh-builtin { color: #ffa657; }
        .sh-variable { color: #ffa657; }
        .sh-tag { color: #7ee787; }
        .sh-attr { color: #79c0ff; }

        /* Tool use/result blocks */
        .tool-block {
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .tool-block-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            cursor: pointer;
            user-select: none;
            font-size: 12px;
        }
        .tool-block-header:hover { background: #252b33; }
        .tool-chevron {
            color: var(--text-subtle);
            font-size: 10px;
            transition: transform 0.15s;
            flex-shrink: 0;
        }
        .tool-block.open .tool-chevron { transform: rotate(90deg); }
        .tool-name {
            font-weight: 600;
            color: var(--accent-cyan);
        }
        .tool-id {
            color: var(--text-subtle);
            font-size: 11px;
            margin-left: auto;
        }
        .tool-body {
            display: none;
            border-top: 1px solid var(--border);
            max-height: 400px;
            overflow: auto;
        }
        .tool-block.open .tool-body { display: block; }
        .tool-body pre {
            margin: 0;
            padding: 12px 16px;
            background: var(--bg-surface);
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Footer */
        .session-footer {
            border-top: 1px solid var(--border);
            padding: 16px 0;
            margin-top: 0;
            background: var(--bg-surface);
        }
        .footer-inner {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-subtle);
        }
        .footer-inner a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .footer-inner a:hover { color: var(--text); }

        @media (max-width: 640px) {
            .header-inner, .turns, .footer-inner { padding: 0 16px; }
            .header-meta { gap: 8px; font-size: 11px; }
            body { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div id="root" class="loading">Loading session...</div>
    <script>
        // Turnshare Web Renderer
        // Fetches session.json from a GitHub Gist and renders it.
        // Schema: see /schema/session.schema.json

        (async function() {
            const root = document.getElementById('root');
            // Support hash (#<gist-id>), query param (?g=<id>), and path (/g/<id>)
            const hash = window.location.hash.replace(/^#\/?/, '');
            const gistId = hash || new URLSearchParams(window.location.search).get('g');

            if (!gistId) {
                root.className = 'error';
                root.textContent = 'No session ID provided. Use #<gist-id>';
                return;
            }

            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`);
                if (!res.ok) throw new Error(`Gist not found (${res.status})`);
                const gist = await res.json();
                const sessionFile = gist.files['session.json'];
                if (!sessionFile) throw new Error('No session.json in gist');

                // Handle truncated gists (>1MB) by fetching raw URL
                let content = sessionFile.content;
                if (sessionFile.truncated && sessionFile.raw_url) {
                    const rawRes = await fetch(sessionFile.raw_url);
                    content = await rawRes.text();
                }

                const session = JSON.parse(content);
                render(session, gist.owner);
            } catch (e) {
                root.className = 'error';
                root.textContent = e.message;
            }

            function render(session, gistOwner) {
                root.className = '';
                const meta = session.metadata;
                const turns = session.turns || [];

                // Update page title
                const projectLabel = meta.projectName || meta.projectPath || 'Session';
                document.title = `${projectLabel} — Turnshare`;

                root.innerHTML = '';

                // Header
                root.appendChild(renderHeader(meta, turns.length, gistOwner));

                // Turns
                const turnsEl = el('div', 'turns');
                for (const turn of turns) {
                    turnsEl.appendChild(renderTurn(turn));
                }
                root.appendChild(turnsEl);

                // Footer
                root.appendChild(renderFooter());
            }

            function renderHeader(meta, turnCount, gistOwner) {
                const header = el('header', 'session-header');
                const inner = el('div', 'header-inner');

                // Top row: agent badge + project name
                const top = el('div', 'header-top');
                const badge = el('span', `agent-badge ${(meta.agent || '').replace(/\s+/g, '-')}`);
                badge.textContent = agentLabel(meta.agent);
                top.appendChild(badge);

                if (meta.projectName || meta.projectPath) {
                    const proj = el('span', 'header-project');
                    proj.textContent = meta.projectName || lastPathSegment(meta.projectPath);
                    top.appendChild(proj);
                }
                inner.appendChild(top);

                // Meta row
                const metaRow = el('div', 'header-meta');
                if (meta.model) metaRow.appendChild(metaSpan('Model', meta.model));
                if (meta.gitBranch) metaRow.appendChild(metaSpan('Branch', meta.gitBranch));
                metaRow.appendChild(metaSpan('Turns', String(turnCount)));
                if (meta.startedAt) metaRow.appendChild(metaSpan('Started', formatDate(meta.startedAt)));
                if (meta.endedAt) metaRow.appendChild(metaSpan('Duration', formatDuration(meta.startedAt, meta.endedAt)));
                if (gistOwner && gistOwner.login) metaRow.appendChild(metaSpan('Shared by', gistOwner.login));
                inner.appendChild(metaRow);

                header.appendChild(inner);
                return header;
            }

            function renderTurn(turn) {
                const turnEl = el('div', `turn role-${turn.role}`);

                // Turn header
                const header = el('div', 'turn-header');
                const roleEl = el('span', 'role-indicator');
                roleEl.textContent = turn.role;
                header.appendChild(roleEl);

                if (turn.timestamp) {
                    const ts = el('span', 'turn-timestamp');
                    ts.textContent = formatTime(turn.timestamp);
                    header.appendChild(ts);
                }
                turnEl.appendChild(header);

                // Content blocks
                const contentEl = el('div', 'turn-content');
                for (const block of (turn.content || [])) {
                    contentEl.appendChild(renderContentBlock(block));
                }
                turnEl.appendChild(contentEl);

                return turnEl;
            }

            function renderContentBlock(block) {
                switch (block.type) {
                    case 'text': return renderText(block.text);
                    case 'tool_use': return renderToolUse(block);
                    case 'tool_result': return renderToolResult(block);
                    default: {
                        const d = el('div', 'content-text');
                        d.textContent = JSON.stringify(block);
                        return d;
                    }
                }
            }

            function renderText(text) {
                const container = el('div', 'content-text');
                container.innerHTML = markdownToHtml(text);
                return container;
            }

            function renderToolUse(block) {
                const wrapper = el('div', 'tool-block');
                const header = el('div', 'tool-block-header');
                header.innerHTML = `<span class="tool-chevron">&#9654;</span><span class="tool-name">${esc(block.name)}</span><span class="tool-id">${esc(block.id || '')}</span>`;
                header.addEventListener('click', () => wrapper.classList.toggle('open'));
                wrapper.appendChild(header);

                if (block.input) {
                    const body = el('div', 'tool-body');
                    const pre = document.createElement('pre');
                    try {
                        pre.textContent = JSON.stringify(JSON.parse(block.input), null, 2);
                    } catch {
                        pre.textContent = block.input;
                    }
                    body.appendChild(pre);
                    wrapper.appendChild(body);
                }

                return wrapper;
            }

            function renderToolResult(block) {
                const wrapper = el('div', 'tool-block');
                const label = block.name ? `${block.name} result` : 'Tool result';
                const header = el('div', 'tool-block-header');
                header.innerHTML = `<span class="tool-chevron">&#9654;</span><span class="tool-name">${esc(label)}</span>`;
                header.addEventListener('click', () => wrapper.classList.toggle('open'));
                wrapper.appendChild(header);

                if (block.output) {
                    const body = el('div', 'tool-body');
                    const pre = document.createElement('pre');
                    pre.textContent = block.output;
                    body.appendChild(pre);
                    wrapper.appendChild(body);
                }

                return wrapper;
            }

            function renderFooter() {
                const footer = el('footer', 'session-footer');
                const inner = el('div', 'footer-inner');
                inner.innerHTML = `<span>Shared with Turnshare</span>`;
                footer.appendChild(inner);
                return footer;
            }

            // ---- Markdown ----

            function markdownToHtml(text) {
                if (!text) return '';
                let html = esc(text);

                // Fenced code blocks: ```lang\n...\n```
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                    const highlighted = highlight(code, lang);
                    const headerHtml = `<div class="code-block-header"><span>${lang || 'text'}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`;
                    return `</p><div class="code-block">${headerHtml}<pre><code>${highlighted}</code></pre></div><p>`;
                });

                // Inline code
                html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

                // Headings (### before ## before #)
                html = html.replace(/^### (.+)$/gm, '</p><h3>$1</h3><p>');
                html = html.replace(/^## (.+)$/gm, '</p><h2>$1</h2><p>');
                html = html.replace(/^# (.+)$/gm, '</p><h1>$1</h1><p>');

                // Bold and italic
                html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

                // Unordered lists (- item)
                html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
                html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '</p><ul>$1</ul><p>');

                // Ordered lists (1. item)
                html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

                // Links [text](url)
                html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

                // Paragraphs: wrap in <p>, convert double newlines
                html = '<p>' + html.replace(/\n\n+/g, '</p><p>') + '</p>';

                // Clean up empty <p> tags
                html = html.replace(/<p>\s*<\/p>/g, '');

                return html;
            }

            // ---- Utilities ----

            function el(tag, className) {
                const e = document.createElement(tag);
                if (className) e.className = className;
                return e;
            }

            function esc(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            function agentLabel(agent) {
                const labels = { 'claude-code': 'Claude Code', 'codex': 'Codex', 'opencode': 'OpenCode' };
                return labels[agent] || agent || 'Unknown';
            }

            function lastPathSegment(path) {
                return path ? path.split('/').filter(Boolean).pop() : '';
            }

            function metaSpan(label, value) {
                const s = document.createElement('span');
                s.innerHTML = `<span class="meta-label">${esc(label)}</span> ${esc(value)}`;
                return s;
            }

            function formatDate(iso) {
                try {
                    const d = new Date(iso);
                    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
                } catch { return iso; }
            }

            function formatTime(iso) {
                try {
                    return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
                } catch { return ''; }
            }

            function formatDuration(startIso, endIso) {
                try {
                    const ms = new Date(endIso) - new Date(startIso);
                    if (ms < 0) return '';
                    const s = Math.floor(ms / 1000);
                    if (s < 60) return `${s}s`;
                    const m = Math.floor(s / 60);
                    if (m < 60) return `${m}m ${s % 60}s`;
                    const h = Math.floor(m / 60);
                    return `${h}h ${m % 60}m`;
                } catch { return ''; }
            }

            // ---- Syntax Highlighting ----
            // Minimal regex-based highlighter. Covers the common tokens
            // in JS/TS, Python, Bash, Go, Rust, Swift, JSON, and generic code.
            // Already-escaped HTML entities from esc() are preserved.

            const LANG_RULES = {
                javascript: tokenRulesJS(), typescript: tokenRulesJS(),
                js: tokenRulesJS(), ts: tokenRulesJS(), jsx: tokenRulesJS(), tsx: tokenRulesJS(),
                python: tokenRulesPy(), py: tokenRulesPy(),
                bash: tokenRulesSh(), sh: tokenRulesSh(), shell: tokenRulesSh(), zsh: tokenRulesSh(), fish: tokenRulesSh(),
                json: tokenRulesJSON(),
                go: tokenRulesGo(),
                rust: tokenRulesRust(), rs: tokenRulesRust(),
                swift: tokenRulesSwift(),
                css: tokenRulesCSS(),
                html: tokenRulesHTML(), xml: tokenRulesHTML(),
                sql: tokenRulesSQL(),
            };

            function highlight(code, lang) {
                const rules = LANG_RULES[(lang || '').toLowerCase()];
                if (!rules) return code; // no rules = return as-is (already escaped)
                return applyRules(code, rules);
            }

            function applyRules(code, rules) {
                // Build one combined regex from all rules
                const parts = rules.map((r, i) => `(${r.pattern.source})`);
                const combined = new RegExp(parts.join('|'), 'gm');
                return code.replace(combined, function() {
                    const args = arguments;
                    // Find which group matched
                    let offset = 1;
                    for (let i = 0; i < rules.length; i++) {
                        if (args[offset] !== undefined) {
                            return `<span class="${rules[i].cls}">${args[offset]}</span>`;
                        }
                        offset += rules[i].groups + 1;
                    }
                    return args[0];
                });
            }

            function r(pattern, cls, groups) { return { pattern, cls, groups: groups || 0 }; }

            function tokenRulesJS() { return [
                r(/\/\/.*$/m, 'sh-comment'),
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/`(?:[^`\\]|\\.)*`/, 'sh-string'),
                r(/\b(async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|from|function|if|import|in|instanceof|let|new|of|return|super|switch|this|throw|try|typeof|var|void|while|with|yield)\b/, 'sh-keyword'),
                r(/\b(true|false|null|undefined|NaN|Infinity)\b/, 'sh-builtin'),
                r(/\b(string|number|boolean|any|void|never|unknown|object|symbol|bigint|interface|type|enum|namespace|declare|readonly|keyof|infer|extends)\b/, 'sh-type'),
                r(/\b\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
                r(/=&gt;|[=!]==?|&amp;&amp;|\|\||[+\-*/%]=?|&lt;=?|&gt;=?/, 'sh-operator'),
            ]; }

            function tokenRulesPy() { return [
                r(/#.*$/m, 'sh-comment'),
                r(/("""[\s\S]*?"""|'''[\s\S]*?''')/, 'sh-string'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield)\b/, 'sh-keyword'),
                r(/\b(True|False|None|self|cls)\b/, 'sh-builtin'),
                r(/\b(int|float|str|bool|list|dict|set|tuple|bytes|type|object)\b/, 'sh-type'),
                r(/\b\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
                r(/(@\w+)/, 'sh-function'),
            ]; }

            function tokenRulesSh() { return [
                r(/#.*$/m, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(if|then|else|elif|fi|for|while|do|done|case|esac|in|function|return|local|export|source|alias|unalias|set|unset)\b/, 'sh-keyword'),
                r(/\$\w+|\$\{[^}]+\}/, 'sh-variable'),
                r(/\b\d+\b/, 'sh-number'),
                r(/[|;&]|&amp;&amp;|\|\|/, 'sh-operator'),
            ]; }

            function tokenRulesJSON() { return [
                r(/(")(?:(?!"|\\).|\\.)*(")\s*:/, 'sh-property', 0),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(true|false|null)\b/, 'sh-builtin'),
                r(/\b-?\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
            ]; }

            function tokenRulesGo() { return [
                r(/\/\/.*$/m, 'sh-comment'),
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'`])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(break|case|chan|const|continue|default|defer|else|fallthrough|for|func|go|goto|if|import|interface|map|package|range|return|select|struct|switch|type|var)\b/, 'sh-keyword'),
                r(/\b(true|false|nil|iota)\b/, 'sh-builtin'),
                r(/\b(int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|float32|float64|complex64|complex128|byte|rune|string|bool|error|any)\b/, 'sh-type'),
                r(/\b\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
                r(/:=|=&gt;|[=!]=|&amp;&amp;|\|\||[+\-*/%]=?|&lt;-?|&gt;=?/, 'sh-operator'),
            ]; }

            function tokenRulesRust() { return [
                r(/\/\/.*$/m, 'sh-comment'),
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(as|async|await|break|const|continue|crate|dyn|else|enum|extern|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|type|union|unsafe|use|where|while|yield)\b/, 'sh-keyword'),
                r(/\b(true|false|None|Some|Ok|Err)\b/, 'sh-builtin'),
                r(/\b(i8|i16|i32|i64|i128|isize|u8|u16|u32|u64|u128|usize|f32|f64|bool|char|str|String|Vec|Box|Option|Result)\b/, 'sh-type'),
                r(/\b\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
                r(/=&gt;|[=!]==?|&amp;&amp;|\|\||[+\-*/%]=?|&lt;=?|&gt;=?|::/, 'sh-operator'),
            ]; }

            function tokenRulesSwift() { return [
                r(/\/\/.*$/m, 'sh-comment'),
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(associatedtype|break|case|catch|class|continue|default|defer|deinit|do|else|enum|extension|fallthrough|fileprivate|for|func|guard|if|import|in|init|inout|internal|is|let|mutating|nonmutating|open|operator|override|private|protocol|public|repeat|rethrows|return|self|Self|static|struct|subscript|super|switch|throw|throws|try|typealias|var|weak|where|while|async|await)\b/, 'sh-keyword'),
                r(/\b(true|false|nil)\b/, 'sh-builtin'),
                r(/\b(Int|Int8|Int16|Int32|Int64|UInt|Float|Double|Bool|String|Array|Dictionary|Set|Optional|Any|AnyObject|Void)\b/, 'sh-type'),
                r(/\b\d+\.?\d*(?:[eE][+-]?\d+)?\b/, 'sh-number'),
                r(/@\w+/, 'sh-function'),
            ]; }

            function tokenRulesCSS() { return [
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/(#[0-9a-fA-F]{3,8})\b/, 'sh-number'),
                r(/\b\d+\.?\d*(px|em|rem|%|vh|vw|s|ms|deg|fr)?\b/, 'sh-number'),
                r(/[.#][\w-]+/, 'sh-function'),
                r(/\b(important|inherit|initial|unset|none|auto|flex|grid|block|inline|relative|absolute|fixed|sticky)\b/, 'sh-keyword'),
            ]; }

            function tokenRulesHTML() { return [
                r(/&lt;!--[\s\S]*?--&gt;/, 'sh-comment'),
                r(/(&lt;\/?)([\w-]+)/, 'sh-tag', 1),
                r(/([\w-]+)(=)/, 'sh-attr', 1),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
            ]; }

            function tokenRulesSQL() { return [
                r(/--.*$/m, 'sh-comment'),
                r(/\/\*[\s\S]*?\*\//, 'sh-comment'),
                r(/(["'])(?:(?!\1|\\).|\\.)*\1/, 'sh-string'),
                r(/\b(SELECT|FROM|WHERE|INSERT|INTO|UPDATE|SET|DELETE|CREATE|ALTER|DROP|TABLE|INDEX|VIEW|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IN|IS|NULL|AS|ORDER|BY|GROUP|HAVING|LIMIT|OFFSET|UNION|ALL|DISTINCT|COUNT|SUM|AVG|MIN|MAX|CASE|WHEN|THEN|ELSE|END|EXISTS|BETWEEN|LIKE|VALUES|PRIMARY|KEY|FOREIGN|REFERENCES|CONSTRAINT|DEFAULT|CHECK|UNIQUE|CASCADE|GRANT|REVOKE|BEGIN|COMMIT|ROLLBACK|TRANSACTION)\b/i, 'sh-keyword'),
                r(/\b(INTEGER|INT|BIGINT|SMALLINT|TINYINT|FLOAT|DOUBLE|DECIMAL|NUMERIC|CHAR|VARCHAR|TEXT|BLOB|DATE|TIME|TIMESTAMP|DATETIME|BOOLEAN|SERIAL|UUID)\b/i, 'sh-type'),
                r(/\b\d+\.?\d*\b/, 'sh-number'),
            ]; }
        })();

        // Global copy handler (needs to be outside the IIFE)
        function copyCode(btn) {
            const block = btn.closest('.code-block');
            const code = block.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
            });
        }
    </script>
</body>
