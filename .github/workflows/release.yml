name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/macos

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set version
        id: version
        run: |
          echo "tag=$(date -u +'%Y%m%d.%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "display=$(cat ../../VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build release binary
        run: swift build -c release

      - name: Generate app icon
        run: |
          ICON_SRC="../../Design/Logo/turnshare-app-icon-1024.png"
          ICONSET="Turnshare.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     "$ICON_SRC" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     "$ICON_SRC" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     "$ICON_SRC" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   "$ICON_SRC" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   "$ICON_SRC" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   "$ICON_SRC" --out "$ICONSET/icon_512x512.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o Turnshare.icns

      - name: Create .app bundle
        run: |
          APP="Turnshare.app"
          BIN_PATH=$(swift build -c release --show-bin-path)
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN_PATH/Turnshare" "$APP/Contents/MacOS/"
          install_name_tool -add_rpath @loader_path/../Frameworks "$APP/Contents/MacOS/Turnshare"
          cp Turnshare.icns "$APP/Contents/Resources/AppIcon.icns"
          cp Sources/Turnshare/Resources/menubar-icon*.png "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Turnshare</string>
            <key>CFBundleDisplayName</key>
            <string>Turnshare</string>
            <key>CFBundleIdentifier</key>
            <string>com.nclandrei.turnshare</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.version.outputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.version.outputs.display }}</string>
            <key>CFBundleExecutable</key>
            <string>Turnshare</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>SUFeedURL</key>
            <string>https://turnshare.nicolaeandrei.com/appcast.xml</string>
            <key>SUPublicEDKey</key>
            <string>${{ secrets.SPARKLE_EDDSA_PUBLIC_KEY }}</string>
            <key>SUEnableAutomaticChecks</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Embed Sparkle framework
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)
          # SPM copies Sparkle.framework (with XPC services) into the build output
          mkdir -p Turnshare.app/Contents/Frameworks
          cp -R "$BIN_PATH/Sparkle.framework" Turnshare.app/Contents/Frameworks/

      - name: Codesign
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          ENTITLEMENTS="Turnshare.entitlements"

          # Sign Sparkle XPC services first
          find Turnshare.app/Contents/XPCServices -name "*.xpc" 2>/dev/null | while read item; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp "$item"
          done

          # Sign nested dylibs/frameworks (skip SPM resource bundles)
          find Turnshare.app/Contents -name "*.dylib" -o -name "*.framework" | while read item; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp "$item"
          done

          # Sign the main app
          codesign --force --sign "$IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --timestamp \
            Turnshare.app

      - name: Verify codesign
        run: codesign -dvv Turnshare.app

      - name: Package for notarization
        run: ditto -c -k --sequesterRsrc --keepParent Turnshare.app Turnshare.zip

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit Turnshare.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Wait for ticket propagation
        run: |
          echo "Waiting 60s for Apple notarization ticket to propagate..."
          sleep 60

      - name: Staple
        continue-on-error: true
        run: |
          for i in $(seq 1 5); do
            if xcrun stapler staple Turnshare.app; then
              exit 0
            fi
            echo "Staple attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "::warning::Stapling failed — app is still notarized and will work, Gatekeeper checks online instead"
          exit 1

      - name: Re-package
        run: |
          rm Turnshare.zip
          ditto -c -k --sequesterRsrc --keepParent Turnshare.app Turnshare.zip

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 Turnshare.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle signature
        id: sparkle
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          # sign_update is in the Sparkle artifacts directory
          SIGN_UPDATE=$(find .build/artifacts -name "sign_update" -not -path "*/old_dsa*" -type f | head -1)
          SIGNATURE=$("$SIGN_UPDATE" Turnshare.zip --ed-key-file <(echo "$SPARKLE_EDDSA_PRIVATE_KEY"))
          # sign_update outputs: sparkle:edSignature="..." length="..."
          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          gh release create "$TAG" \
            --title "Turnshare ${TAG}" \
            --notes "Automated build from main (${SHORT_SHA}). Signed and notarized." \
            --target "${{ github.event.workflow_run.head_sha }}" \
            Turnshare.zip

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/nclandrei/turnshare/releases/download/${TAG}/Turnshare.zip"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nclandrei/homebrew-tap.git" "$RUNNER_TEMP/homebrew-tap"

          cat > "$RUNNER_TEMP/homebrew-tap/Casks/turnshare.rb" << CASK
          cask "turnshare" do
            version "${TAG#v}"
            sha256 "${SHA256}"

            url "${URL}"
            name "Turnshare"
            desc "macOS menu bar app for sharing AI coding sessions via GitHub Gists"
            homepage "https://github.com/nclandrei/turnshare"

            depends_on macos: ">= :sonoma"

            app "Turnshare.app"

            zap trash: [
              "~/Library/Preferences/com.nclandrei.turnshare.plist",
            ]
          end
          CASK

          cd "$RUNNER_TEMP/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/turnshare.rb
          git commit -m "Update turnshare to ${TAG}"
          git push

      - name: Update appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.tag }}"
          SIZE=$(stat -f%z Turnshare.zip)
          URL="https://github.com/nclandrei/turnshare/releases/download/${TAG}/Turnshare.zip"
          SIGNATURE="${{ steps.sparkle.outputs.signature }}"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          python3 - "$GITHUB_WORKSPACE/docs/appcast.xml" "$TAG" "$VERSION" "$DATE" "$URL" "$SIGNATURE" "$SIZE" << 'PYEOF'
          import sys
          path, tag, version, date, url, sig, size = sys.argv[1:]
          item = f"""    <item>
              <title>Turnshare {tag}</title>
              <pubDate>{date}</pubDate>
              <sparkle:version>{version}</sparkle:version>
              <sparkle:shortVersionString>${{ steps.version.outputs.display }}</sparkle:shortVersionString>
              <enclosure url="{url}"
                         type="application/octet-stream"
                         sparkle:edSignature="{sig}"
                         length="{size}" />
            </item>"""
          with open(path) as f:
              xml = f.read()
          xml = xml.replace("  </channel>", item + "\n  </channel>")
          with open(path, "w") as f:
              f.write(xml)
          PYEOF

          # Commit and push the updated appcast
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for ${TAG}"
          git push origin HEAD:main

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
