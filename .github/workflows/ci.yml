name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
